<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Influenza virion icon">
  <!-- surface glycoprotein spikes (HA/NA) -->
  <g stroke="#4C8C8A" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="14"/>
    <line x1="32" y1="58" x2="32" y2="50"/>
    <line x1="6" y1="32" x2="14" y2="32"/>
    <line x1="58" y1="32" x2="50" y2="32"/>
    <line x1="13" y1="13" x2="19" y2="19"/>
    <line x1="51" y1="13" x2="45" y2="19"/>
    <line x1="13" y1="51" x2="19" y2="45"/>
    <line x1="51" y1="51" x2="45" y2="45"/>
  </g>
  <g stroke="#C88F7A" stroke-width="3" stroke-linecap="round">
    <circle cx="32" cy="5.5" r="2.4" fill="#C88F7A" stroke="none"/>
    <circle cx="32" cy="58.5" r="2.4" fill="#C88F7A" stroke="none"/>
    <circle cx="5.5" cy="32" r="2.4" fill="#C88F7A" stroke="none"/>
    <circle cx="58.5" cy="32" r="2.4" fill="#C88F7A" stroke="none"/>
  </g>
  <!-- virion envelope -->
  <circle cx="32" cy="32" r="18" fill="#E8F0EF" stroke="#4C8C8A" stroke-width="3"/>
  <!-- 8 RNA segments inside -->
  <g stroke="#1F2A2E" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
    <line x1="26" y1="24" x2="26" y2="40"/>
    <line x1="30" y1="22" x2="30" y2="42"/>
    <line x1="34" y1="22" x2="34" y2="42"/>
    <line x1="38" y1="24" x2="38" y2="40"/>
  </g>
</svg>
