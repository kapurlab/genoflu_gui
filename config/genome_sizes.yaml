# genome_sizes.yaml — expected assembled genome size (bp) per species, used for
# the assembly-QC sanity check (total assembly length within tolerance of the
# expected size). OPTIONAL: a species absent here simply skips the size check.
# Keyed by "Genus species" (matched against the Kraken2 dominant species).
#
# `tolerance` is the fractional deviation that still counts as "pass"
# (default 0.20 = ±20%). Values are approximate typical chromosome+plasmid
# totals from NCBI RefSeq; tune for your panel.

defaults:
  tolerance: 0.20

species:
  "Acinetobacter baumannii": 3980000
  "Bordetella pertussis": 4090000
